<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>读秀图书爬虫控制台</title>
    <link rel="stylesheet" href="./styles.css?v=20260519-2" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="config-panel">
        <div class="brand">
          <div class="brand-main">
            <div class="brand-mark">BC</div>
            <div class="brand-copy">
              <h1>读秀图书爬虫</h1>
              <p id="statusText">空闲</p>
            </div>
          </div>
          <button id="toggleConfig" class="icon-btn" type="button" title="收起参数">‹</button>
        </div>

        <div class="collapsed-rail">
          <button id="expandConfig" class="rail-button" type="button" title="展开参数">›</button>
          <span>参数</span>
        </div>

        <div class="config-content">
          <div class="panel-heading">
            <h1>读秀图书爬虫</h1>
            <p>配置任务范围、并发和断点续爬</p>
          </div>

          <form id="crawlForm" class="form-grid">
            <div class="config-scroll">
              <details class="collapse-group" open>
                <summary>任务范围</summary>
                <div class="collapse-body">
                  <label class="field field-full">
                    <span>搜索 URL</span>
                    <textarea id="searchUrl" rows="3"></textarea>
                  </label>

                  <div class="field-row">
                    <label class="field">
                      <span>起始页</span>
                      <input id="startPage" type="number" min="1" placeholder="断点自动" />
                    </label>
                    <label class="field">
                      <span>页数</span>
                      <input id="pages" type="number" min="1" value="666" />
                    </label>
                  </div>

                  <label class="field field-full">
                    <span>目标本数</span>
                    <input id="targetBooks" type="number" min="1" value="10000" />
                  </label>
                </div>
              </details>

              <details class="collapse-group" open>
                <summary>并发与节流</summary>
                <div class="collapse-body">
                  <label class="field field-full">
                    <span>线程数</span>
                    <input id="workers" type="number" min="1" max="16" value="5" />
                  </label>

                  <div class="field-row">
                    <label class="field">
                      <span>最小停顿 秒</span>
                      <input id="minDelay" type="number" min="0" step="0.1" value="1.0" />
                    </label>
                    <label class="field">
                      <span>最大停顿 秒</span>
                      <input id="maxDelay" type="number" min="0" step="0.1" value="3.5" />
                    </label>
                  </div>

                  <div class="field-row">
                    <label class="field">
                      <span>重试次数</span>
                      <input id="retries" type="number" min="0" value="2" />
                    </label>
                    <label class="field">
                      <span>重试等待 秒</span>
                      <input id="retryDelay" type="number" min="0" step="0.5" value="2" />
                    </label>
                  </div>
                </div>
              </details>

              <details class="collapse-group" open>
                <summary>输出与 Cookie</summary>
                <div class="collapse-body">
                  <label class="field field-full">
                    <span>输出 basename</span>
                    <input id="output" type="text" value="output/duxiu_books" />
                  </label>

                  <label class="field field-full">
                    <span>Cookie 文件路径</span>
                    <input id="cookieFile" type="text" placeholder="例如 /Users/you/cookie.txt" />
                  </label>

                  <label class="field field-full">
                    <span>Cookie 文本</span>
                    <textarea id="cookie" rows="4" placeholder="也可以直接粘贴 Cookie；不会写入 state 文件"></textarea>
                  </label>

                  <div class="toggle-row">
                    <label><input id="resume" type="checkbox" checked /> 断点续爬</label>
                    <label><input id="saveBlockHtml" type="checkbox" checked /> 保存阻断页面</label>
                  </div>
                </div>
              </details>
            </div>

            <div class="actions">
              <button id="startBtn" type="submit">启动</button>
              <button id="stopBtn" type="button" class="secondary">停止</button>
            </div>
          </form>
        </div>
      </aside>

      <main class="workspace">
        <section class="topbar">
          <div>
            <h2>运行状态</h2>
            <p id="lastPosition">最后位置：-</p>
          </div>
          <div class="topbar-actions">
            <button id="focusBtn" type="button" class="focus-toggle">
              <span class="focus-toggle-mark" aria-hidden="true"></span>
              <span class="focus-toggle-copy">
                <strong>专注模式</strong>
                <small>官方网页 + 实时日志</small>
              </span>
            </button>
            <div id="statusBadge" class="status-badge idle">idle</div>
          </div>
        </section>

        <details class="workspace-section metrics-section" open>
          <summary>核心指标</summary>
          <section class="metrics-grid">
            <div class="metric">
              <span>已保存</span>
              <strong id="booksSaved">0</strong>
            </div>
            <div class="metric">
              <span>当前页</span>
              <strong id="currentPage">0</strong>
            </div>
            <div class="metric">
              <span>当前条</span>
              <strong id="currentItem">0</strong>
            </div>
            <div class="metric">
              <span>详情链接</span>
              <strong id="detailLinks">0</strong>
            </div>
            <div class="metric">
              <span>失败</span>
              <strong id="failedCount">0</strong>
            </div>
            <div class="metric">
              <span>并发中</span>
              <strong id="inFlight">0</strong>
            </div>
          </section>
        </details>

        <section id="alertBox" class="alert hidden"></section>

        <details class="progress-panel">
          <summary>进度与输出文件</summary>
          <div class="progress-header">
            <span>页进度</span>
            <span id="pageProgressLabel">0 / 0</span>
          </div>
          <div class="progress-track">
            <div id="pageProgress" class="progress-fill"></div>
          </div>
          <div class="file-row">
            <span id="csvPath">CSV: -</span>
            <span id="jsonPath">JSON: -</span>
            <span id="statePath">STATE: -</span>
          </div>
        </details>

        <section class="focus-stage">
          <section class="focus-panel focus-browser-panel">
            <div class="focus-panel-head">
              <div class="focus-head-copy">
                <h3>读秀官方网页</h3>
                <p id="focusMessage">左侧保持官方网页；一旦发现验证，会自动切到对应页面。</p>
              </div>
              <div class="focus-head-actions">
                <div id="focusStatePill" class="focus-state-pill standby">待机观察</div>
                <button id="syncFocusPreview" type="button" class="focus-ghost-btn">同步验证页</button>
                <button id="focusExitBtn" type="button" class="focus-exit-btn">退出专注</button>
              </div>
            </div>

            <div class="focus-browser-shell">
              <div class="focus-browser-bar">
                <div class="focus-browser-dots" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
                <div id="focusUrl" class="focus-browser-url">https://book.duxiu.com/</div>
              </div>
              <div class="focus-browser-viewport">
                <iframe
                  id="officialFrame"
                  class="official-frame"
                  title="读秀官方网页"
                  loading="eager"
                  referrerpolicy="no-referrer"
                ></iframe>
              </div>
            </div>
          </section>

          <section class="focus-panel focus-console-panel">
            <div class="focus-panel-head focus-console-head">
              <div class="focus-head-copy">
                <h3>实时日志</h3>
                <p>验证、重定向、风控与运行轨迹会在这里持续刷新。</p>
              </div>
              <div id="focusSignal" class="focus-signal standby">未发现验证</div>
            </div>
            <section id="focusAlert" class="focus-inline-alert hidden"></section>
            <div id="focusLogs" class="log-stream focus-log-stream"></div>
          </section>
        </section>

        <section class="log-workbench">
          <div class="panel logs-panel">
            <div class="panel-title">
              <span class="summary-title">实时日志</span>
              <button id="clearLogs" type="button" class="text-btn">清屏</button>
            </div>
            <div id="logs" class="log-stream"></div>
          </div>
        </section>
      </main>

      <aside class="rows-drawer">
        <div class="rows-header">
          <div>
            <h2>最近保存</h2>
            <p id="lastTitle">-</p>
          </div>
          <button id="toggleRows" class="icon-btn" type="button" title="收起最近保存">›</button>
        </div>
        <button id="expandRows" class="rail-button" type="button" title="展开最近保存">‹</button>
        <div id="recentRows" class="saved-list"></div>
      </aside>
    </div>
    <script src="./app.js?v=20260519-2"></script>
  </body>
</html>
